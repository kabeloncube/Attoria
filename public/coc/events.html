<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Events - Ættoria</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/events-tracker.css">
    <link rel="stylesheet" href="/assets/css/flaticon-icons.css">
    <link rel="icon" type="image/png" href="/assets/images/logo/logo.png">
    
</head>
<body>
    <!-- Navigation Bar -->
    <div class="auth-bar">
        <div class="brand">
            <a href="/" style="text-decoration: none; color: inherit;">
                <strong> Ættoria</strong>
            </a>
        </div>
        <div class="user-info" id="userInfo">
            <div class="auth-buttons" id="authButtons">
                <a href="/" style="text-decoration: none;">
                    <button>← Back to Dashboard</button>
                </a>
                <button id="loginButton">Login</button>
                <button id="registerButton">Register</button>
            </div>
            <div class="logged-in" id="loggedInUser" style="display: none;">
                <span id="welcomeMessage"></span>
                <a href="/" style="text-decoration: none;">
                    <button>← Back to Dashboard</button>
                </a>
                <a href="/coc/profile.html" style="text-decoration: none;">
                    <button id="profileButton">🎮 My Profile</button>
                </a>
                <button id="logoutButton">Logout</button>
            </div>
        </div>
    </div>

    <!-- Events Container -->
    <div class="container">
        <div class="header">
            <h1>📅 Clash of Clans Events</h1>
            <p>Stay up to date with all upcoming events, timers, and important dates</p>
        </div>

        <!-- Events Controls and Display -->
        <div id="eventsContainer"> <!-- populated by JS --> </div>
    </div>

    <script src="/assets/js/components.js"></script>
    <script src="/assets/js/events-tracker.js"></script>
    <script src="/assets/js/events-page.js"></script>
</body>
</html>
